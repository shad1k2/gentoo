name: Build Shad1k1 Desktop322
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"

      - name: Build in Docker
        run: |
          # Используем актуальный stage3
          docker run --name builder --privileged gentoo/stage3:latest /bin/bash -c "
            emerge-webrsync &&
            emerge --quiet app-eselect/eselect-repository &&
            eselect repository enable guru &&
            emaint sync -r guru &&
            
            # Настройка под твой Pentium (generic x86-64)
            echo 'COMMON_FLAGS=\"-O2 -pipe\"' > /etc/portage/make.conf &&
            echo 'CFLAGS=\"\${COMMON_FLAGS}\"' >> /etc/portage/make.conf &&
            echo 'CXXFLAGS=\"\${COMMON_FLAGS}\"' >> /etc/portage/make.conf &&
            echo 'MAKEOPTS=\"-j2\"' >> /etc/portage/make.conf &&
            echo 'BINPKG_FORMAT=\"xpak\"' >> /etc/portage/make.conf &&
            echo 'FEATURES=\"buildpkg\"' >> /etc/portage/make.conf &&
            echo 'ACCEPT_LICENSE=\"*\"' >> /etc/portage/make.conf &&
            
            # Ключевые слова для SwayFX, Waybar и wlroots
            mkdir -p /etc/portage/package.accept_keywords &&
            echo 'gui-wm/swayfx ~amd64' >> /etc/portage/package.accept_keywords/build &&
            echo 'gui-libs/wlroots ~amd64' >> /etc/portage/package.accept_keywords/build &&
            echo 'gui-apps/waybar ~amd64' >> /etc/portage/package.accept_keywords/build &&
            mkdir -p /etc/portage/package.use
            # Глобально включаем wayland, чтобы gtkmm и другие либы не ругались
            echo "*/* wayland" >> /etc/portage/package.use/build
            # Специфичные флаги для Waybar
            echo "gui-apps/waybar tray network pulseaudio" >> /etc/portage/package.use/build
            # Для wlroots лучше оставить X, если планируешь запускать X-приложения через XWayland
            echo "gui-libs/wlroots x11-backend" >> /etc/portage/package.use/build
            # USE-флаги (Waybar: трей, сеть, звук; wlroots: стандартные бэкенды)
            mkdir -p /etc/portage/package.use &&
            echo 'gui-apps/waybar tray network pulseaudio' >> /etc/portage/package.use/build &&
            echo 'gui-libs/wlroots x11-backend' >> /etc/portage/package.use/build &&
            
            # Сборка
            emerge --verbose gui-wm/swayfx gui-apps/waybar
          "

      - name: Extract Binaries
        run: |
          mkdir ./packages
          docker cp builder:/var/cache/binpkgs/ ./packages/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gentoo-binaries-shad1k1
          path: ./packages/binpkgs/
